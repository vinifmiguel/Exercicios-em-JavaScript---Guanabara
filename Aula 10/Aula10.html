<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Eventos DOM</title>
    <style>
        div#area {
            font: 20pt Arial;
            background-color: rgb(14, 102, 14);
            color: white;
            width: 200px;
            height: 200px;
            line-height: 200px;
            text-align: center;
        }
    </style>
</head>

<body>
    <div id="area">
        Interaja...
    </div>
</body>

</html>

<script>

    const a = document.querySelector('#area');
    a.addEventListener('click', clicar)
    a.addEventListener('mouseenter', entrar)
    a.addEventListener('mouseout', sair)

    function clicar() {
        a.textContent = 'Clicou!'
        a.style.backgroundColor = 'red'
    }

    function entrar() {
        a.textContent = 'Entrou!'
    }

    function sair() {
        a.textContent = 'Saiu!'
        a.style.backgroundColor = 'green'

    }
</script>
