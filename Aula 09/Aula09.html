<!DOCTYPE html>
<html lang="pt-br">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Primeiros Passos com DOM</title>
    <style>
        body {
            background-color: rgb(68, 125, 199);
            color: white;
            font: normal 18pt arial;
        }
    </style>
</head>

<body>
    <h1>Iniciando estudos DOM</h1>
    <p>Aqui vai o resultado</p>
    <p>Aprendendo a usar o <strong>DOM</strong> em JavaScript.</p>
    <div class="click">Clique em mim</div>
    <script>
        const p1 = document.getElementsByTagName('p')[0];
        p1.style.color = 'red'

        const p2 = document.getElementsByTagName('p')[1];
        p2.style.color = "black"

        p1.innerText = 'Mudando o texto...'


      const id1 = document.querySelector('div.click')
      
      id1.style.background = "black"

        




    </script>

</body>

</html>
